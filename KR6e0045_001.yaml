body:
  text: 東晉天竺三藏佛陀跋陀羅譯身口意清淨除滅諸垢穢一心恭敬禮十方三世佛普賢願力故悉覩見諸佛一一如來所一切剎塵禮於一微塵中見一切諸佛菩薩衆圍繞法界塵亦然以衆妙音聲宣揚諸最勝無量功德海不可得窮盡以普賢行力無上衆供具供養於十方三世一切佛以妙香花鬘種種諸伎樂一切妙莊嚴普供養諸佛我以貪恚癡造一切惡行身口意不善悔過悉除滅一切衆生福諸聲聞緣覺菩薩及諸佛功德悉隨喜十方一切佛初成等正覺我令悉勸請轉無上法輪示現涅槃者合掌恭敬請住一切塵劫安樂諸群生我所集功德回向施衆生究竟菩薩行逮無上菩提悉供養過去現在十方佛願未來世尊速成菩提道普莊嚴十方一切諸佛剎如來坐道場菩薩衆充滿令十方衆生除滅諸煩惱深解真實義常得安樂住我修菩薩行成就宿命智除滅一切障永盡無有餘悉遠離生死諸魔煩惱業猶日處虛空蓮花不著水遍行遊十方教化諸群生除滅惡道苦具足菩薩行雖隨順世間不捨菩薩道盡未來際劫具修普賢行若有同行者願常集一處身口意善業皆悉令同等若遇善知識開示普賢行於此菩薩所親近常不離常見一切佛菩薩衆圍繞盡未來際劫悉恭敬供養守護諸佛法讚歎菩薩行盡未來劫修究竟普賢道雖在生死中具無盡功德智慧巧方便諸三昧解脫一一微塵中見不思議剎於一一剎中見不思議佛見如是十方一切世界海一一世界海悉見諸佛海於一言音中具一切妙音一一妙音中具足最勝音甚深智慧力入無盡妙音轉三世諸佛清淨正法輪一切未來劫悉能作一念三世一切劫悉為一念際一念中悉見三世諸如來亦普分別知解脫及境界於一微塵中出三世淨剎一切十方塵莊嚴剎亦然悉見未來佛成道轉法輪究竟佛事已示現入涅槃神力遍遊行大乘力普門慈力覆一切行力功德滿功德力清淨智慧力無礙三昧方便力逮得菩提力清淨善業力除滅煩惱力壞散諸魔力具普賢行力嚴淨佛剎海度脫衆生海分別諸業海窮盡智慧海清淨諸行海滿足諸願海悉見諸佛海我於劫海行三世諸佛行及無量大願我皆悉具足普賢行成佛普賢菩薩名諸佛第一子我善根回向願悉與彼同身口意清淨自在莊嚴剎逮成等正覺皆悉同普賢如文殊師利普賢菩薩行我所有善根回向亦如是三世諸如來所歎回向道我回向善根成滿普賢行願我命終時除滅諸障礙面見阿彌陀往生安樂國生彼佛國已成滿諸大願阿彌陀如來現前授我記嚴淨普賢行滿足文殊願盡未來際劫究竟菩薩行
